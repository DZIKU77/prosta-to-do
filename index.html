<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-center pt-40 flex flex-col items-center [background:bisque]">
    <section class="flex mb-10">
        <button id="red" onclick="setRed()" class="bg-red-400 p-5 rounded-full border border-[1px] border-black mr-2"></button>
        <button id="red" onclick="setBlue()" class="bg-blue-400 p-5 rounded-full border border-[1px] border-black mr-2"></button>
        <button id="red" onclick="setDef()" class="[background:bisque] -400 p-5 rounded-full border border-[1px] border-black mr-2"></button>
    </section>
    <h1 class="text-3xl font-light text-center [word-spacing:1em]">To Do List</h1>
    <h2 id="wynik">0 / 0 | 0%</h2>
    <form onsubmit="dodaj(event)" method="get" class="mt-4">
        <input id="task" type="text" name="task" placeholder="Add a new task..." class="border-2 rounded-md p-4 shadow-xl">
        <button id="addBtn" type="submit" class="transition-colors duration-300 p-5 bg-yellow-800 text-white rounded-md hover:bg-yellow-900 ">Add Task</button><br>
    </form>
        <button onclick="delSel()" id="delSel" type="button" class="mt-5 pl-10 pr-10 pt-5 pb-5 border w-70 rounded-full border-black">Delete Selected</button>
    <ul class="mt-4 border-2 p-10 w-2/3 text-center bg-white rounded-md" id="list"></ul>
    <script>
        function dodaj(event) {
            event.preventDefault(); // Prevent form submission
            const taskInput = document.getElementById('task');
            const task = taskInput.value;
            if (task.trim() !== '') {
                const li = document.createElement('li');
                const checkbox = document.createElement('input');

                checkbox.type = "checkbox";
                checkbox.className = "mr-2 w-4 h-4 accent-blue-500";
                checkbox.addEventListener("change", zmienWynik);

                li.className = "flex items-center gap-2";

                li.append(checkbox, document.createTextNode(task));

                document.getElementById('list').appendChild(li);
                
                // localStorage is a web API that stores key-value pairs in the browser's local storage.
                // Data persists across page reloads and browser sessions.
                // It only stores strings, so we use JSON.stringify() to convert objects/arrays to strings,
                // and JSON.parse() to convert back.
                
                // Retrieve existing tasks from localStorage. If none, default to empty array.
                const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
                
                // Add the new task to the tasks array.
                tasks.push(task);
                
                // Save the updated tasks array back to localStorage as a JSON string.
                localStorage.setItem('tasks', JSON.stringify(tasks));
                
            }else{
                alert("Please enter the name of the task!");
            }
            taskInput.value = ''; // Clear the input field
        }

        function delSel() {
            const checkedBoxes = document.querySelectorAll('#list input[type="checkbox"]:checked');
            checkedBoxes.forEach(checkbox => {
                const li = checkbox.parentElement;
                li.remove();
            });
            
            // After deleting selected tasks, update localStorage with the remaining tasks.
            // Array.from() converts the NodeList to an array so we can use map().
            // map() extracts the text content of each li (the task name).
            const remainingTasks = Array.from(document.querySelectorAll('#list li')).map(li => li.textContent.trim());
            
            // Save the remaining tasks to localStorage.
            localStorage.setItem('tasks', JSON.stringify(remainingTasks));
            
            zmienWynik(); // Update the result after deletion
        }

        function zmienWynik(){
            const checked = document.querySelectorAll('#list input[type="checkbox"]:checked').length;
            const allCB = document.querySelectorAll('#list input[type="checkbox"]').length;
            const prc = ((checked/allCB)*100).toFixed(2);

            if(isNaN(prc)){
                document.getElementById('wynik').innerHTML = `0 / 0 | 0%`;
                return;
            }
            document.getElementById('wynik').innerHTML = `${checked} / ${allCB} | ${prc}%`;
        }

        function setRed() {
            document.body.className = "bg-red-100 text-center pt-40 flex flex-col items-center";
            document.getElementById('addBtn').className = "transition-colors duration-300 p-5 bg-red-800 text-white rounded-md hover:bg-red-900";
        }

        function setBlue(){
            document.body.className = "text-center pt-40 flex flex-col items-center bg-blue-100";
            document.getElementById('addBtn').className = "transition-colors duration-300 p-5 bg-blue-800 text-white rounded-md hover:bg-blue-900";
        }

        function setDef() {
            document.body.className = "text-center pt-40 flex flex-col items-center [background:bisque]";
            document.getElementById('addBtn').className = "transition-colors duration-300 p-5 bg-yellow-800 text-white rounded-md hover:bg-yellow-900 ";
        }

        // Function to load tasks from localStorage when the page loads.
        function loadTasks() {
            // Retrieve tasks from localStorage. JSON.parse() converts the JSON string back to an array.
            // If no tasks exist, default to an empty array.
            const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            
            // For each task in the array, create the corresponding li element with checkbox.
            tasks.forEach(task => {
                const li = document.createElement('li');
                const checkbox = document.createElement('input');
                
                checkbox.type = "checkbox";
                checkbox.className = "mr-2 w-4 h-4 accent-blue-500";
                // Add event listener to update the count when checkbox changes.
                checkbox.addEventListener("change", zmienWynik);
                
                li.className = "flex items-center gap-2";
                
                // Append the checkbox and the task text to the li.
                li.append(checkbox, document.createTextNode(task));
                
                // Add the li to the list.
                document.getElementById('list').appendChild(li);
            });
            
            // Update the task count and percentage after loading.
            zmienWynik();
        }

        // When the window loads (page is ready), call loadTasks to populate the list.
        window.onload = function() {
            loadTasks();
        };
    </script>
</body>
</html>
